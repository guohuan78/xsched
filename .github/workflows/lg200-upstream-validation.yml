name: Upstream contribution validation

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or commit to validate
        required: true
        type: string

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ocl-icd-opencl-dev clang-format
      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          args=(
            -DCMAKE_BUILD_TYPE=Release
            -DPLATFORM_OPENCL=ON
            -DBUILD_TEST=ON
          )
          if [[ -d platforms/lg200 ]]; then
            args+=( -DPLATFORM_LG200=ON )
          fi
          if [[ -f platforms/lg200/hal/include/xsched/lg200/level2.h ]]; then
            args+=( -DLG200_KCD_LEVEL2=ON )
          fi
          if grep -q 'option(BUILD_SERVICE' CMakeLists.txt; then
            args+=( -DBUILD_SERVICE=OFF )
          fi
          cmake -S . -B build-validation -G Ninja "${args[@]}"
      - name: Build and test contribution targets
        shell: bash
        run: |
          set -euxo pipefail
          targets=()
          tests=()
          if [[ -d platforms/lg200 ]]; then
            targets+=(lg200_info lg200_resource_test)
            tests+=(./build-validation/platforms/lg200/test/lg200_resource_test)
          fi
          if [[ -f platforms/lg200/hal/include/xsched/lg200/level2.h ]]; then
            targets+=(lg200_kcd_queue_control_test lg200_level2_contract_test)
            tests+=(./build-validation/platforms/lg200/test/lg200_kcd_queue_control_test)
            tests+=(./build-validation/platforms/lg200/test/lg200_level2_contract_test)
          fi
          if [[ -f preempt/test/preempt_level_capability_test.cpp ]]; then
            targets+=(preempt_level_capability_test)
            tests+=(./build-validation/preempt/test/preempt_level_capability_test)
          fi
          if [[ ${#targets[@]} -eq 0 ]]; then
            targets+=(preempt halopencl)
          fi
          cmake --build build-validation --target "${targets[@]}" --parallel 2
          for test_bin in "${tests[@]}"; do "$test_bin"; done
      - name: Validate public C headers
        shell: bash
        run: |
          set -euxo pipefail
          if [[ -f platforms/lg200/hal/include/xsched/lg200/hal.h ]]; then
            printf '#include "xsched/lg200/hal.h"\nint main(void){return 0;}\n' | \
              cc -x c -std=c11 -Wall -Wextra -Werror \
                -Iinclude -Iplatforms/lg200/hal/include -fsyntax-only -
          fi
          if [[ -f platforms/lg200/hal/include/xsched/lg200/level2.h ]]; then
            printf '#include "xsched/lg200/level2.h"\nint main(void){return 0;}\n' | \
              cc -x c -std=c11 -Wall -Wextra -Werror \
                -Iinclude -Iplatforms/lg200/hal/include -fsyntax-only -
          fi
      - name: Diff hygiene
        shell: bash
        run: |
          set -euxo pipefail
          git diff --check "origin/${{ github.event.repository.default_branch }}...HEAD"